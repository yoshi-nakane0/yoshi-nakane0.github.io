<!DOCTYPE html>
<html lang="jp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Market Analysis</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1>Stock Market Analysis</h1>
    <p id="currentDate"></p>
    <div class="menu-grid">
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#database"></use>
          </svg>
        </div>
        <span>Data</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#camera"></use>
          </svg>
        </div>
        <span>Record</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#battery"></use>
          </svg>
        </div>
        <span>Power</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#target"></use>
          </svg>
        </div>
        <span>Target</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#hand"></use>
          </svg>
        </div>
        <span>Control</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#flame"></use>
          </svg>
        </div>
        <span>Trending</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#zap"></use>
          </svg>
        </div>
        <span>Quick</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#wifi"></use>
          </svg>
        </div>
        <span>Network</span>
      </div>
      <div class="menu-item">
        <div class="icon-wrapper">
          <svg class="icon" viewBox="0 0 24 24">
            <use href="#settings"></use>
          </svg>
        </div>
        <span>Settings</span>
      </div>
    </div>
  </div>

  <svg style="display:none;">
    <symbol id="database" viewBox="0 0 24 24">
      <!-- Database icon SVG path here -->
    </symbol>
    <symbol id="camera" viewBox="0 0 24 24">
      <!-- Camera icon SVG path here -->
    </symbol>
    <symbol id="battery" viewBox="0 0 24 24">
      <!-- Battery icon SVG path here -->
    </symbol>
    <symbol id="target" viewBox="0 0 24 24">
      <!-- Target icon SVG path here -->
    </symbol>
    <symbol id="hand" viewBox="0 0 24 24">
      <!-- Hand icon SVG path here -->
    </symbol>
    <symbol id="flame" viewBox="0 0 24 24">
      <!-- Flame icon SVG path here -->
    </symbol>
    <symbol id="zap" viewBox="0 0 24 24">
      <!-- Zap icon SVG path here -->
    </symbol>
    <symbol id="wifi" viewBox="0 0 24 24">
      <!-- Wifi icon SVG path here -->
    </symbol>
    <symbol id="settings" viewBox="0 0 24 24">
      <!-- Settings icon SVG path here -->
    </symbol>
  </svg>
</body>
</html>
